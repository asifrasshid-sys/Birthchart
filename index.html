          1:{q:"Royal Nature, Authoritative, Best leadership skill, Great Imagination Power",j:"Not meant for JOB — should be Business / Entrepreneur",sk:"Hotel, Luxury Business",gn:"1, 9, 6, 5",bn:"8",gc:"Red, Green, Yellow",bc:"Black, White",st:"You are assertive, individualistic and of proud nature. You are an initiator of new beginnings and new ideas. You always tend to believe and adhere to your ideas if you know that you are on the right track.\n\nYou can be called a trendsetter who has a unique taste for everything. You don't like working under pressure and are the boss of your own. You like taking decisions for yourself and are royal and king-like in looks.",wk:"You are aggressive and don't like to compromise at any stage of life. You can be very egoistic and have anger issues as well.\n\nYou are dominating in nature and hence not a good follower. You are a good critic but on the other hand not very good at accepting criticism from others."},
          2:{q:"Delicate, Less Stability, Impulsive mood changer, Good Host, good Sixth sense",j:"Comfort in JOB not Business",sk:"Water, Liquid, Navy, Consultancy — they are king makers",gn:"1, 5",bn:"8, 4, 9",gc:"White, Red, Green",bc:"Black",st:"You are kind-hearted, gentle, helpful and faithful. You believe in loyalty and have a special liking for poetry, music and art.\n\nYou are a peace maker who does not like quarrels. You have very strong intuition power — you can sense things and should believe in your sixth sense.",wk:"You are a person having a flickering mind who keeps on changing choices in life. You are an extremely moody person and have mood swings.\n\nYou may lack self-confidence. Nervousness and anxiety may act as a hurdle in your life."},

          5:{q:"Balance, Great Audibility, Great Humans, Self accountable",j:"Job and Business Both are equal",sk:"Banking, Financial, Real Estate, Agriculture, Property, Company Secretary",gn:"1, 6, 5",bn:"4, 8",gc:"Green, Red, White",bc:"—",st:"You are blessed with the number of balance and stability in life. You know how to create a balance in life whether it is emotional, financial, relationship or career.\n\nYou are self-accountable and self-responsible. You are a good entertainer who keeps everyone happy.",wk:"You like changes too frequently in your life. You might easily get bored and want to bring frequent changes in your routine.\n\nYou might be a bit lazy in life too. You might sometimes take decisions in haste and can be impulsive in nature."},

          7:{q:"Low confidence, Depending on others, Suspicious, Setback in Money or Marriage — Don't trust blindly",j:"Comfort in JOB not business",sk:"Consultancy, Detective, Doctor, Researcher, Teacher, Healer",gn:"6, 4, 5",bn:"8",gc:"Red, White, Blue, Green",bc:"Black",st:"You are a person of wisdom and intelligence. You like going deep into sciences and love doing research. You are good at solving intricate problems.\n\nYou can become an excellent preacher, healer, teacher, researcher and analyst. You want to do every task with complete perfection.",wk:"You should not trust people easily as there are high chances that you will get deceived by the people whom you trust the most.\n\nYou are continuously engrossed in negative thoughts. You have a lot of mood swings and experience restlessness that can lead to anxiety and stress."},

        // ── Calculations ──
        const reduce = (n) => { while (n > 9) n = String(n).split("").reduce((s, d) => s + parseInt(d), 0); return n; };
        const nameNum = (name) => { const l = name.toUpperCase().replace(/[^A-Z]/g, ""); let s = 0; for (const c of l) s += LM[c] || 0; return reduce(s); };
        const driverNum = (dd) => reduce(String(parseInt(dd)).split("").reduce((a, b) => a + parseInt(b), 0));
        const conductorNum = (dd, mm, yyyy) => reduce((dd + mm + yyyy).split("").reduce((a, b) => a + parseInt(b), 0));
        const kuaNum = (yyyy, gender) => {
          const yr = reduce(String(yyyy).split("").reduce((s, d) => s + parseInt(d), 0));
          if (gender === "Male") { let k = 11 - yr; if (k <= 0) k += 9; return reduce(k); }
          return reduce(yr + 4);
        };

          const raw = (dd + mm + yyyy).split("").map(Number).filter(d => d !== 0);

          if (kn >= 1 && kn <= 9) kc[kn] = 1;
          return [[4,9,2],[3,5,7],[8,1,6]].map(row =>
            row.map(pos => ({ pos, dob: dc[pos] ? Array(dc[pos]).fill(pos) : [], name: nc[pos] ? [pos] : [], kua: kc[pos] ? [pos] : [] }))
          );
        };
        const parseDate = (dob) => {
          const p = dob.split("/");
          if (p.length !== 3) return null;
          const d = parseInt(p[0]), m = parseInt(p[1]), y = parseInt(p[2]);
          if (isNaN(d) || isNaN(m) || isNaN(y) || d < 1 || d > 31 || m < 1 || m > 12 || y < 1800 || y > 2100) return null;
          return { dd: String(d).padStart(2,"0"), mm: String(m).padStart(2,"0"), yyyy: String(y) };
        };
        const calcReport = (fn, ln, dob, gender) => {
          if (!fn.trim() || !ln.trim() || !dob.trim()) return { err: "Please enter valid First Name, Last Name and Date of Birth." };
          const p = parseDate(dob);
          if (!p) return { err: "Please enter valid Date of Birth in DD/MM/YYYY format." };

              Y+=20; cBase(Y,96,"#22d3ee");
              txt("🔢",PAD+16,Y+26,"16px sans-serif","#f1f5f9"); txt("Numerology Summary",PAD+40,Y+22,"700 13px sans-serif","#f1f5f9"); txt("Your four core numbers",PAD+40,Y+38,"11px sans-serif","#475569");
              [{l:"Driver",v:rep.dr,c:"#22d3ee"},{l:"Conductor",v:rep.cn,c:"#60a5fa"},{l:"Kua",v:rep.kn,c:"#a78bfa"},{l:"Name",v:rep.nn,c:"#f472b6"}].forEach(({l,v,c},i)=>{
                const cx=PAD+i*(inner/4); rr(cx+4,Y+44,inner/4-8,46,8,"#0d1528","rgba(99,179,237,0.08)");
                const g=ctx.createLinearGradient(cx+4,Y+44,cx+inner/4,Y+44); g.addColorStop(0,c); g.addColorStop(1,"transparent"); ctx.fillStyle=g; ctx.fillRect(cx+4,Y+44,inner/4-8,2);
                txt(l,cx+inner/8,Y+60,"700 9px sans-serif","#475569","center");
                ctx.shadowColor=c; ctx.shadowBlur=12; txt(String(v),cx+inner/8,Y+84,"900 36px monospace",c,"center"); ctx.shadowBlur=0;
              });
              Y+=112;

              cBase(Y,280,"#60a5fa");
              txt("⊞",PAD+16,Y+26,"16px sans-serif","#f1f5f9"); txt("Lo Shu Grid",PAD+40,Y+22,"700 13px sans-serif","#f1f5f9"); txt("Magic square — all numbers mapped",PAD+40,Y+38,"11px sans-serif","#475569");
              const gSz=74,gGap=8,gW2=3*(gSz+gGap)-gGap,gX=PAD+(inner-gW2)/2,gY=Y+50;
              rep.grid.forEach((row,ri)=>{row.forEach(({pos,dob,name,kua},ci)=>{
                const cx=gX+ci*(gSz+gGap),cy=gY+ri*(gSz+gGap),has=dob.length+name.length+kua.length>0;
                rr(cx,cy,gSz,gSz,10,has?"rgba(34,211,238,0.03)":"#0d1528",has?"rgba(34,211,238,0.22)":"rgba(99,179,237,0.08)");
                txt(String(pos),cx+gSz-6,cy+13,"700 8px monospace","#475569","right");
                const all=[...dob.map(d=>({v:d,c:"#22d3ee"})),...name.map(d=>({v:d,c:"#a78bfa"})),...kua.map(d=>({v:d,c:"#34d399"}))];
                if(!all.length){txt("·",cx+gSz/2,cy+gSz/2+8,"18px sans-serif","rgba(99,179,237,0.12)","center");}
                else{const ns=all.length>3?13:18,tw=all.length*(ns+5);let sx=cx+(gSz-tw)/2;all.forEach(({v,c})=>{ctx.shadowColor=c;ctx.shadowBlur=8;txt(String(v),sx,cy+gSz/2+7,"900 "+ns+"px monospace",c);ctx.shadowBlur=0;sx+=ns+6;});}
              });});
              const legY=gY+3*(gSz+gGap)+8; let lx=PAD+(inner-360)/2;
              [{c:"#22d3ee",l:"DOB + Driver + Conductor"},{c:"#a78bfa",l:"Name ("+rep.nn+")"},{c:"#34d399",l:"Kua ("+rep.kn+")"}].forEach(({c,l})=>{
                ctx.fillStyle=c; ctx.shadowColor=c; ctx.shadowBlur=4; ctx.beginPath(); ctx.arc(lx+4,legY+4,4,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
                txt(l,lx+13,legY+8,"600 10px sans-serif","#94a3b8"); lx+=ctx.measureText(l).width+30;
              });
              Y+=296;

              cBase(Y,168,"#34d399");
              txt("🎯",PAD+16,Y+26,"16px sans-serif","#f1f5f9"); txt("Recommendations",PAD+40,Y+22,"700 13px sans-serif","#f1f5f9"); txt("Lucky and unlucky influences",PAD+40,Y+38,"11px sans-serif","#475569");
              const hw=(inner-12)/2;
              rr(PAD,Y+46,hw,44,8,"rgba(52,211,153,0.05)","rgba(52,211,153,0.15)"); txt("✦ GOOD NUMBERS",PAD+10,Y+60,"700 8px sans-serif","#34d399"); txt(rep.gn,PAD+10,Y+80,"500 11px monospace","#f1f5f9","left",hw-16);
              rr(PAD+hw+12,Y+46,hw,44,8,"rgba(244,114,182,0.05)","rgba(244,114,182,0.15)"); txt("✦ BAD NUMBERS",PAD+hw+22,Y+60,"700 8px sans-serif","#f472b6"); txt(rep.bn,PAD+hw+22,Y+80,"500 11px monospace","#f1f5f9","left",hw-16);
              ctx.strokeStyle="rgba(99,179,237,0.08)"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(PAD,Y+98); ctx.lineTo(PAD+inner,Y+98); ctx.stroke();
              txt("✦ GOOD COLORS",PAD,Y+114,"700 8px sans-serif","#475569"); txt("✦ BAD COLORS",PAD+hw+12,Y+114,"700 8px sans-serif","#475569");
              const drawDots=(str,sx,sy)=>{splitC(str).slice(0,5).forEach(c=>{ctx.fillStyle=toHex(c); ctx.beginPath(); ctx.arc(sx+5,sy,5,0,Math.PI*2); ctx.fill(); if(c.toLowerCase()==="white"){ctx.strokeStyle="#334155";ctx.lineWidth=1;ctx.beginPath();ctx.arc(sx+5,sy,5,0,Math.PI*2);ctx.stroke();} txt(c,sx+14,sy+4,"500 10px sans-serif","#f1f5f9"); sx+=ctx.measureText(c).width+26;});};
              drawDots(rep.gc,PAD,Y+134); drawDots(rep.bc,PAD+hw+12,Y+134);
              Y+=184;

              cBase(Y,128,"#a78bfa");
              txt("💼",PAD+16,Y+26,"16px sans-serif","#f1f5f9"); txt("Career & Skills",PAD+40,Y+22,"700 13px sans-serif","#f1f5f9"); txt("Your professional destiny",PAD+40,Y+38,"11px sans-serif","#475569");
              txt("JOB OR BUSINESS",PAD,Y+54,"700 8px sans-serif","#475569"); rr(PAD,Y+60,inner,26,6,"#0d1528","rgba(99,179,237,0.08)"); txt(rep.job,PAD+10,Y+77,"400 12px sans-serif","#94a3b8","left",inner-20);
              txt("SKILL AND SECTOR",PAD,Y+96,"700 8px sans-serif","#475569"); rr(PAD,Y+102,inner,20,6,"#0d1528","rgba(99,179,237,0.08)"); txt(rep.skills,PAD+10,Y+116,"400 12px sans-serif","#94a3b8","left",inner-20);
              Y+=144;

              cBase(Y,persH,"#f472b6");
              txt("🧠",PAD+16,Y+26,"16px sans-serif","#f1f5f9"); txt("Personality Analysis",PAD+40,Y+22,"700 13px sans-serif","#f1f5f9"); txt("Deep character insights",PAD+40,Y+38,"11px sans-serif","#475569");
              let py=Y+52;
              [[rep.qualities,"✦ QUALITIES","#34d399"],[rep.strength,"💪 STRENGTH","#60a5fa"],[rep.weakness,"⚡ WEAKNESS","#f472b6"]].forEach(([text,label,lc])=>{
                txt(label,PAD,py,"700 8px sans-serif",lc); py+=12;
                const endY=drawWrap(text,PAD+10,py+14,inner-20,lh,f12,"#94a3b8");
                const bh=endY-py+4; rr(PAD,py,inner,bh,6,"#0d1528","rgba(99,179,237,0.08)");
                drawWrap(text,PAD+10,py+14,inner-20,lh,f12,"#94a3b8");
                py+=bh+12;
              });

              const link=document.createElement("a");
              link.download=`birth-chart-${rep.fn.toLowerCase()}-${rep.ln.toLowerCase()}.jpg`;
              link.href=cv.toDataURL("image/jpeg",0.95);
              link.click();
            } catch(e) {
              alert("Download failed: "+e.message);
            } finally {
              setBusy(false);
            }
          }, [rep]);

          const ini = rep ? (rep.fn[0]+rep.ln[0]).toUpperCase() : "";
          const inp = { background:"#0d1528", border:"1px solid rgba(99,179,237,0.12)", borderRadius:10, padding:"13px 15px", color:"#f1f5f9", fontFamily:"inherit", fontSize:14, outline:"none", width:"100%", display:"block" };

          return (
            <div style={{fontFamily:"'Outfit',system-ui,sans-serif",background:"#03060f",minHeight:"100vh",color:"#f1f5f9"}}>
              {/* BG */}
              <div style={{position:"fixed",inset:0,zIndex:0,pointerEvents:"none",overflow:"hidden"}}>
                <div style={{position:"absolute",width:500,height:500,top:-100,left:-100,borderRadius:"50%",filter:"blur(60px)",background:"rgba(34,211,238,0.08)"}} />
                <div style={{position:"absolute",width:400,height:400,bottom:-80,right:-80,borderRadius:"50%",filter:"blur(60px)",background:"rgba(167,139,250,0.08)"}} />
                <div style={{position:"absolute",inset:0,backgroundImage:"linear-gradient(rgba(99,179,237,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(99,179,237,0.03) 1px,transparent 1px)",backgroundSize:"52px 52px"}} />
              </div>

              <div style={{position:"relative",zIndex:1,maxWidth:860,margin:"0 auto",padding:"48px 16px 80px"}}>

                {/* Header */}
                <div style={{textAlign:"center",marginBottom:52}}>
                  <div style={{fontSize:"clamp(28px,5.5vw,52px)",fontWeight:900,letterSpacing:-1.5,lineHeight:1.05,marginBottom:12,background:"linear-gradient(135deg,#fff 0%,#22d3ee 35%,#a78bfa 65%,#f472b6 100%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text"}}>
                    Birth Chart Calculator
                  </div>
                  <div style={{fontSize:15,color:"#94a3b8",marginBottom:10}}>
                    by <span style={{background:"linear-gradient(135deg,#22d3ee,#a78bfa)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",fontWeight:800}}>Aasif Ali Nur</span>
                  </div>
                  <div style={{fontSize:15,color:"#94a3b8",lineHeight:1.6}}>Unlock your cosmic blueprint through the ancient science of numbers</div>
                </div>

                {/* Input */}
                <Card accent="#22d3ee">
                  <CardHead icon="🔮" title="Personal Details" sub="Enter your information to generate the chart" iconBg="rgba(34,211,238,0.1)" />
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                    <div><label style={{fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"#94a3b8",display:"block",marginBottom:7}}>First Name</label><input style={inp} name="fn" value={form.fn} onChange={chg} placeholder="e.g. Kashif" autoComplete="off" /></div>
                    <div><label style={{fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"#94a3b8",display:"block",marginBottom:7}}>Last Name</label><input style={inp} name="ln" value={form.ln} onChange={chg} placeholder="e.g. Rasheed" autoComplete="off" /></div>
                    <div><label style={{fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"#94a3b8",display:"block",marginBottom:7}}>Date of Birth (DD/MM/YYYY)</label><input style={inp} name="dob" value={form.dob} onChange={chg} placeholder="e.g. 26/06/1978" autoComplete="off" /></div>
                    <div>
                      <label style={{fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"#94a3b8",display:"block",marginBottom:7}}>Gender</label>
                      <select style={inp} name="gender" value={form.gender} onChange={chg}>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                      </select>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:10,marginTop:18,flexWrap:"wrap"}}>
                    <button onClick={gen} style={{flex:1,minWidth:180,background:"linear-gradient(135deg,#0ea5e9,#22d3ee 50%,#a78bfa)",border:"none",borderRadius:10,padding:"14px 24px",color:"#fff",fontFamily:"inherit",fontSize:14,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 24px rgba(34,211,238,0.2)"}}>⚡ Generate Birth Chart</button>
                    <button onClick={rst} style={{background:"transparent",border:"1px solid rgba(99,179,237,0.2)",borderRadius:10,padding:"14px 18px",color:"#94a3b8",fontFamily:"inherit",fontSize:13,fontWeight:600,cursor:"pointer"}}>↺ Reset</button>
                  </div>
                  {err && <div style={{marginTop:14,padding:"12px 16px",background:"rgba(239,68,68,0.07)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:10,color:"#f87171",fontSize:13}}>⚠ {err}</div>}
                </Card>

                {/* Results */}
                {rep && (
                  <div ref={resultRef}>
                    {/* Profile banner */}
                    <div style={{background:"linear-gradient(135deg,rgba(34,211,238,0.06),rgba(167,139,250,0.06))",border:"1px solid rgba(34,211,238,0.14)",borderRadius:18,padding:"24px 28px",marginBottom:16,display:"flex",alignItems:"center",gap:20,flexWrap:"wrap"}}>
                      <div style={{width:62,height:62,borderRadius:"50%",background:"linear-gradient(135deg,#22d3ee,#a78bfa)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:900,color:"#fff",flexShrink:0,boxShadow:"0 0 0 3px rgba(34,211,238,0.12)"}}>
                        {ini}
                      </div>
                      <div>
                        <div style={{fontSize:"clamp(18px,3.5vw,26px)",fontWeight:800,letterSpacing:-0.5,marginBottom:6}}>{rep.fn} {rep.ln}</div>
                        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                          {["📅 "+rep.dob, (rep.gender==="Male"?"♂":"♀")+" "+rep.gender].map(t => (
                            <span key={t} style={{fontSize:11,fontWeight:600,color:"#94a3b8",background:"rgba(99,179,237,0.07)",border:"1px solid rgba(99,179,237,0.1)",borderRadius:100,padding:"3px 12px"}}>{t}</span>
                          ))}
                        </div>
                      </div>
                    </div>

                    {/* Summary */}
                    <Card accent="#22d3ee">
                      <CardHead icon="🔢" title="Numerology Summary" sub="Your four core numbers" iconBg="rgba(34,211,238,0.1)" />
                      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
                        {[{l:"Driver",v:rep.dr,c:"#22d3ee"},{l:"Conductor",v:rep.cn,c:"#60a5fa"},{l:"Kua",v:rep.kn,c:"#a78bfa"},{l:"Name",v:rep.nn,c:"#f472b6"}].map(({l,v,c}) => (
                          <div key={l} style={{background:"#0d1528",border:"1px solid rgba(99,179,237,0.1)",borderRadius:12,padding:"16px 10px",textAlign:"center",position:"relative",overflow:"hidden"}}>
                            <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,${c},transparent)`}} />
                            <div style={{fontSize:9,fontWeight:700,letterSpacing:2,textTransform:"uppercase",color:"#475569",marginBottom:8}}>{l}</div>
                            <div style={{fontSize:44,fontWeight:900,fontFamily:"monospace",lineHeight:1,color:c,textShadow:`0 0 16px ${c}80`}}>{v}</div>
                          </div>
                        ))}
                      </div>
                    </Card>

                    {/* Grid */}
                    <Card accent="#60a5fa">
                      <CardHead icon="⊞" title="Lo Shu Grid" sub="Magic square — all numbers mapped" iconBg="rgba(96,165,250,0.1)" />
                      <GridView grid={rep.grid} nn={rep.nn} kn={rep.kn} />
                    </Card>

                    {/* Recommendations */}
                    <Card accent="#34d399">
                      <CardHead icon="🎯" title="Recommendations" sub="Lucky and unlucky influences" iconBg="rgba(52,211,153,0.1)" />
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                        <div style={{borderRadius:12,padding:"14px 16px",border:"1px solid rgba(52,211,153,0.15)",background:"rgba(52,211,153,0.05)"}}>
                          <div style={{fontSize:9,fontWeight:800,letterSpacing:2,textTransform:"uppercase",marginBottom:6,color:"#34d399"}}>✦ Good Numbers</div>
                          <div style={{fontSize:13,fontWeight:500,color:"#f1f5f9",lineHeight:1.7,fontFamily:"monospace"}}>{rep.gn}</div>
                        </div>
                        <div style={{borderRadius:12,padding:"14px 16px",border:"1px solid rgba(244,114,182,0.15)",background:"rgba(244,114,182,0.05)"}}>
                          <div style={{fontSize:9,fontWeight:800,letterSpacing:2,textTransform:"uppercase",marginBottom:6,color:"#f472b6"}}>✦ Bad Numbers</div>
                          <div style={{fontSize:13,fontWeight:500,color:"#f1f5f9",lineHeight:1.7,fontFamily:"monospace"}}>{rep.bn}</div>
                        </div>
                      </div>
                      <div style={{height:1,background:"rgba(99,179,237,0.1)",margin:"16px 0"}} />
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                        <div><div style={{fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"#475569",marginBottom:8}}>✦ Good Colors</div><Swatches str={rep.gc} /></div>
                        <div><div style={{fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"#475569",marginBottom:8}}>✦ Bad Colors</div><Swatches str={rep.bc} /></div>
                      </div>
                    </Card>

                    {/* Career */}
                    <Card accent="#a78bfa">
                      <CardHead icon="💼" title="Career & Skills" sub="Your professional destiny" iconBg="rgba(167,139,250,0.1)" />
                      <div style={{display:"flex",flexDirection:"column",gap:12}}>
                        <div><div style={{fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"#475569",marginBottom:8}}>Job or Business</div><div style={{background:"#0d1528",border:"1px solid rgba(99,179,237,0.1)",borderRadius:10,padding:"16px 18px",fontSize:13,lineHeight:1.85,color:"#94a3b8"}}>{rep.job}</div></div>
                        <div><div style={{fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:"#475569",marginBottom:8}}>Skill and Sector</div><div style={{background:"#0d1528",border:"1px solid rgba(99,179,237,0.1)",borderRadius:10,padding:"16px 18px",fontSize:13,lineHeight:1.85,color:"#94a3b8"}}>{rep.skills}</div></div>
                      </div>
                    </Card>

                    {/* Personality */}
                    <Card accent="#f472b6">
                      <CardHead icon="🧠" title="Personality Analysis" sub="Deep character insights" iconBg="rgba(244,114,182,0.1)" />
                      <PTabs q={rep.qualities} st={rep.strength} wk={rep.weakness} />
                    </Card>

                    <button onClick={downloadJpeg} disabled={busy} style={{width:"100%",marginTop:8,background:"rgba(34,211,238,0.05)",border:"1px solid rgba(34,211,238,0.18)",borderRadius:10,padding:14,color:"#22d3ee",fontFamily:"inherit",fontSize:13,fontWeight:700,cursor:busy?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,opacity:busy?0.6:1}}>
                      {busy ? "⏳ Generating JPEG..." : "📥 Download Report as JPEG"}
                    </button>
                  </div>
                )}
              </div>
            </div>
          );
        }

        // Render app
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
